<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leave a Review – Proctoclinic</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 14px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
    }

    a.button {
      display: inline-block;
      padding: 12px 16px;
      background: #1a73e8;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      width: 100%;
    }

    a.button:hover {
      background: #1558b0;
    }

    .small {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Thank you for visiting Proctoclinic</h1>
    <p>If you had a good experience, please take a moment to leave us a Google review. It really helps others find us.</p>

    <!-- SAFE GOOGLE ENTRY (works everywhere) -->
    <a class="button"
       href="https://www.google.com/maps/search/?api=1&query=Proctoclinic+Bucuresti"
       target="_blank">
       Leave a Google Review
    </a>

    <div class="small">
      You will be redirected to Google Maps → Reviews section
    </div>
  </div>
</body>
</html>
