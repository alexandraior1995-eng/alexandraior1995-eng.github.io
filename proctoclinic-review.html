<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Leave a Review – Proctoclinic</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f9;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      max-width: 400px;
      width: 92%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .button {
      display: block;
      padding: 14px;
      margin-top: 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .primary {
      background: #1a73e8;
      color: white;
    }

    .primary:hover {
      background: #1558b0;
    }

    .secondary {
      background: #f1f3f4;
      color: #333;
    }

    .small {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="card">

    <h1>Thank you for visiting Proctoclinic</h1>

    <p>
      If your experience was positive, please take a moment to leave us a Google review.
      It helps other patients find trusted care and supports our clinic.
    </p>

    <!-- PRIMARY ACTION -->
    <a class="button primary"
       href="https://www.google.com/maps/place/?q=place_id:ChIJr8lC3l0BskAR0W3z3Yl9l6A"
       target="_blank">
       Leave a Google Review
    </a>

    <!-- SECONDARY HELP BUTTON -->
    <a class="button secondary"
       href="https://www.google.com/search?q=Proctoclinic+Bucuresti+reviews"
       target="_blank">
       Open Reviews Page
    </a>

    <div class="small">
      Tip: Tap “Reviews” → “Write a review” if prompted
    </div>

  </div>
</body>
</html>
